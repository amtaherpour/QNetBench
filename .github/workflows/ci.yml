name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip

      - name: Install development and plotting dependencies
        run: python -m pip install -e ".[dev,plot]"

      - name: Ruff lint
        run: python -m ruff check .

      - name: Ruff formatting check
        run: python -m ruff format --check .

      - name: Generate Ruff formatting patch
        if: failure()
        run: |
          python -m ruff format .
          git diff --binary > ruff-format.patch

      - name: Upload Ruff formatting patch
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-format-patch
          path: ruff-format.patch
          if-no-files-found: error

      - name: Contract tests
        run: python -m pytest -q tests/contracts

      - name: Specification tests
        run: python -m pytest -q tests/spec

      - name: Result and artifact tests
        run: python -m pytest -q tests/results tests/artifacts

      - name: Adapter tests
        run: python -m pytest -q tests/adapters

      - name: Metric tests
        run: python -m pytest -q tests/metrics

      - name: Runner and CLI tests
        run: python -m pytest -q tests/runners tests/cli

      - name: Catalog tests
        run: python -m pytest -q tests/catalog tests/cli/test_list.py

      - name: Sweep and analysis tests
        run: python -m pytest -q tests/sweeps tests/analysis tests/cli/test_sweep.py

      - name: Full mock-pipeline gate test
        run: python -m pytest -q tests/integration/test_full_mock_pipeline.py

      - name: Installed CLI mock-pipeline smoke
        run: |
          qnetbench list
          tmp_dir="$(mktemp -d)"
          for benchmark in \
            benchmarks/v0_1/link_2_batch.yaml \
            benchmarks/v0_1/chain_3_batch.yaml \
            benchmarks/v0_1/chain_5_batch.yaml \
            benchmarks/v0_1/grid_3x3_batch.yaml
          do
            qnetbench validate "$benchmark"
            name="$(basename "$benchmark" .yaml)"
            qnetbench run "$benchmark" --backend mock --seed 1 --out "$tmp_dir/$name"
            qnetbench validate-result "$tmp_dir/$name"
            qnetbench summarize "$tmp_dir/$name" > /dev/null
          done
          qnetbench sweep sweeps/v0_1/link_loss_small.yaml --backend mock --out "$tmp_dir/sweep"
          qnetbench plot "$tmp_dir/sweep"
          test -f "$tmp_dir/sweep/sweep_manifest.json"
          test -f "$tmp_dir/sweep/aggregate_metrics.csv"
          test -f "$tmp_dir/sweep/plots/request_success_probability.png"
          test -f "$tmp_dir/sweep/plots/latency_mean_s.png"
          cat "$tmp_dir/sweep/sweep_manifest.json"
          cat "$tmp_dir/sweep/aggregate_metrics.csv"

      - name: Full test suite
        run: python -m pytest -q

      - name: Git whitespace check
        run: git diff --check
