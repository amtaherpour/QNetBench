name: Q2NS research probe

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  q2ns:
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - name: Install build prerequisites
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build git python3
      - name: Build pinned Q2NS and run basic example
        run: |
          mkdir -p research/evidence
          bash research/probes/q2ns_build_probe.sh "$RUNNER_TEMP/q2ns-work" research/evidence/q2ns_probe.json
      - uses: actions/upload-artifact@v4
        with:
          name: q2ns-probe
          path: research/evidence/q2ns_probe.json
