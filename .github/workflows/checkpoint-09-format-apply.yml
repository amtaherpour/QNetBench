name: Checkpoint 9 one-shot formatting apply

on:
  push:
    branches: [checkpoint-09-semantic-mapping]
    paths: [.github/workflows/checkpoint-09-format-apply.yml]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: checkpoint-09-semantic-mapping
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install ruff
      - name: Apply exact Ruff formatting and remove diagnostics
        run: |
          python -m ruff format .
          rm .github/workflows/checkpoint-09-format-apply.yml
          rm .github/workflows/checkpoint-09-format-diagnostic.yml
          git diff --check
      - name: Commit and push
        run: |
          git config user.name "QNetBench CI formatter"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Apply Checkpoint 9 Ruff formatting"
          git push origin HEAD:checkpoint-09-semantic-mapping
