name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip

      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check .

      - name: Ruff formatting check
        run: python -m ruff format --check .

      - name: Contract tests
        run: python -m pytest -q tests/contracts

      - name: Specification tests
        run: python -m pytest -q tests/spec

      - name: Result and artifact tests
        run: python -m pytest -q tests/results tests/artifacts

      - name: Adapter tests
        run: python -m pytest -q tests/adapters

      - name: Metric tests
        run: python -m pytest -q tests/metrics

      - name: Runner and CLI tests
        run: python -m pytest -q tests/runners tests/cli

      - name: Catalog tests
        run: python -m pytest -q tests/catalog tests/cli/test_list.py

      - name: Frozen catalog CLI smoke
        run: |
          qnetbench list
          tmp_dir="$(mktemp -d)"
          for benchmark in \
            benchmarks/v0_1/link_2_batch.yaml \
            benchmarks/v0_1/chain_3_batch.yaml \
            benchmarks/v0_1/chain_5_batch.yaml \
            benchmarks/v0_1/grid_3x3_batch.yaml
          do
            qnetbench validate "$benchmark"
            name="$(basename "$benchmark" .yaml)"
            qnetbench run "$benchmark" --backend mock --seed 1 --out "$tmp_dir/$name"
            qnetbench validate-result "$tmp_dir/$name"
            qnetbench summarize "$tmp_dir/$name" > /dev/null
          done

      - name: Full test suite
        run: python -m pytest -q

      - name: Git whitespace check
        run: git diff --check
