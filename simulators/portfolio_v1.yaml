deferred_profiles:
  - simulator_id: qunetsim
    reason: high-level protocol framework does not match the frozen physical-performance request semantics
  - simulator_id: simulaqron
    reason: application and NetQASM semantics are not the initial physical-performance paper profile
  - simulator_id: qkdnetsim
    reason: QKD key-management and classical-network focus requires a separate future profile
  - simulator_id: qunet
    reason: cost-vector and routing abstraction is not a discrete-event canonical request-result match
fallback_policy:
  q2ns_failure: qualify_and_promote_quisp_without_changing_v0_1_contracts
  sequence_failure: repair_or_pin_sequence_before_considering_replacement
  netsquid_unavailable: continue_open_paper_core_without_blocking
