name: Checkpoint 9 source autofix

on:
  push:
    branches: [checkpoint-09-semantic-mapping]
    paths: [.github/workflows/checkpoint-09-autofix.yml]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: checkpoint-09-semantic-mapping
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install ruff
      - name: Apply verified source corrections
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("research/backends/sequence/mapping_probe.py")
          text = path.read_text(encoding="utf-8")
          old = "from sequence.constants import DENSITY_MATRIX_FORMALISM, SINGLE_HERALDED"
          new = "from sequence.constants import BELL_DIAGONAL_STATE_FORMALISM, SINGLE_HERALDED"
          if old not in text:
              raise SystemExit("expected SeQUeNCe formalism import not found")
          text = text.replace(old, new)
          text = text.replace(
              "formalism=DENSITY_MATRIX_FORMALISM,",
              "formalism=BELL_DIAGONAL_STATE_FORMALISM,",
          )
          path.write_text(text, encoding="utf-8")
          PY
          python -m ruff check --fix .
          python -m ruff format .
          rm .github/workflows/checkpoint-09-autofix.yml
          git diff --check
      - name: Commit corrections
        run: |
          git config user.name "QNetBench CI fixer"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Fix Checkpoint 9 source and SeQUeNCe formalism"
          git push origin HEAD:checkpoint-09-semantic-mapping
