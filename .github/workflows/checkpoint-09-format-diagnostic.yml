name: Checkpoint 9 formatting diagnostic

on:
  push:
    branches: [checkpoint-09-semantic-mapping]
    paths: [.github/workflows/checkpoint-09-format-diagnostic.yml]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install ruff
      - run: python -m ruff format .
      - run: git diff --check
      - uses: actions/upload-artifact@v4
        with:
          name: checkpoint-09-formatted-source
          path: research/backends/sequence/mapping_probe.py
