name: QuISP source research probe

on:
  workflow_dispatch:
  push:
    branches: [checkpoint-08-5-simulator-strategy]
    paths:
      - ".github/workflows/quisp-probe.yml"
      - "research/probes/quisp_source_probe.py"
      - "simulators/portfolio_v1.yaml"
  pull_request:
    paths:
      - ".github/workflows/quisp-probe.yml"
      - "research/probes/quisp_source_probe.py"
      - "simulators/portfolio_v1.yaml"

permissions:
  contents: read

jobs:
  quisp-source:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: mkdir -p research/evidence && python research/probes/quisp_source_probe.py --work "$RUNNER_TEMP/quisp" --output research/evidence/quisp_probe.json
      - uses: actions/upload-artifact@v4
        with:
          name: quisp-source-probe
          path: research/evidence/quisp_probe.json
