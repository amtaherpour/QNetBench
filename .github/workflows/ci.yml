name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip

      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check .

      - name: Ruff formatting check
        run: python -m ruff format --check .

      - name: Contract tests
        run: python -m pytest -q tests/contracts

      - name: Specification tests
        run: python -m pytest -q tests/spec

      - name: Result and artifact tests
        run: python -m pytest -q tests/results tests/artifacts

      - name: Adapter tests
        run: python -m pytest -q tests/adapters

      - name: Metric tests
        run: python -m pytest -q tests/metrics

      - name: Runner and CLI tests
        run: python -m pytest -q tests/runners tests/cli

      - name: Installed CLI smoke
        run: |
          qnetbench --help
          qnetbench validate examples/contracts/minimal_benchmark.yaml
          tmp_dir="$(mktemp -d)"
          qnetbench run examples/contracts/minimal_benchmark.yaml --backend mock --seed 5 --out "$tmp_dir/run"
          qnetbench validate-result "$tmp_dir/run"
          qnetbench summarize "$tmp_dir/run"

      - name: Full test suite
        run: python -m pytest -q

      - name: Git whitespace check
        run: git diff --check
