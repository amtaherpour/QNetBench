name: Checkpoint 9 one-shot source hotfix

on:
  push:
    branches: [checkpoint-09-semantic-mapping]
    paths: [.github/workflows/checkpoint-09-hotfix.yml]

permissions:
  contents: write

jobs:
  hotfix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: checkpoint-09-semantic-mapping
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install ruff
      - name: Apply exact corrections
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("research/backends/sequence/mapping_probe.py")
          text = path.read_text(encoding="utf-8")
          old = '''            reservation_protocol = router.network_manager.protocol_stack[1]
            reservation_protocol.set_swapping_success_rate(
                profile.swap_success_probability
            )
            reservation_protocol.set_swapping_degradation(
                profile.swap_fidelity_factor
            )
'''
          new = '''            reservation_protocol = router.network_manager.protocol_stack[1]
            reservation_protocol.es_succ_prob = profile.swap_success_probability
            reservation_protocol.es_degradation = profile.swap_fidelity_factor
'''
          if old not in text:
              raise SystemExit("expected SeQUeNCe swapping block not found")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          python -m ruff check --fix .
          python -m ruff format .
          rm .github/workflows/checkpoint-09-hotfix.yml
          git diff --check
      - name: Commit and push
        run: |
          git config user.name "QNetBench CI fixer"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Fix SeQUeNCe swapping configuration and formatting"
          git push origin HEAD:checkpoint-09-semantic-mapping
